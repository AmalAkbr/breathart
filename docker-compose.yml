services:
  app:
    build:
      context: .
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
        VITE_WEB3FORMS_KEY: ${VITE_WEB3FORMS_KEY:-4061c748-3472-46d4-b2db-b814c914677a}
        VITE_NODE_ENV: ${VITE_NODE_ENV:-production}
    container_name: brt_app
    env_file:
      - backend/.env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "8080:8080"
    restart: unless-stopped
